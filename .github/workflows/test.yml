name: test

on: [push]

jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
      - name: install dependencies
        run: npm ci
      - name: build
        run: node task/build.mjs
      - name: test
        run: npm test
